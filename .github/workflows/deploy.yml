name: Deploy blog to Jugomesh

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            REPO_DIR="/opt/malla-staging/blog-repo"

            if [ -d "$REPO_DIR" ]; then
              cd "$REPO_DIR" && git pull origin main
            else
              git clone https://github.com/LudiSistemas/jugomesh-blog.git "$REPO_DIR"
            fi

            echo "Blog synced: $(find $REPO_DIR -name '*.md' -not -name 'README.md' | wc -l) posts"
